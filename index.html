<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>潮购 · 虚拟商城（仿真体验版）</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 顶部导航 -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo" data-go="#/home">
        <span class="logo-mark">潮</span><span class="logo-text">潮购</span>
        <span class="logo-tag">仿真体验</span>
      </div>
      <div class="search">
        <svg class="search-ic" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
        <input id="searchInput" type="text" placeholder="搜索 手机 / 无人机 / 奢侈品 / 电脑 / 茅台 ..." />
        <button id="searchBtn">搜索</button>
      </div>
      <div class="top-actions">
        <div class="act" data-go="#/seckill"><span class="ic">⚡</span>限时秒杀</div>
        <div class="act" data-go="#/coupons"><span class="ic">🎟️</span>领券中心</div>
        <div class="act" data-go="#/cart"><span class="ic">🛍️</span>购物车<span class="cart-count" id="cartCount">0</span></div>
        <div class="act" data-go="#/orders"><span class="ic">📦</span>订单</div>
        <div class="act" id="wxLoginBtn" data-act="wxlogin"><span class="ic">💬</span>微信登录</div>
        <div class="act" data-go="#/address"><span class="ic">📍</span>地址</div>
      </div>
    </div>
  </header>

  <!-- 分类条 -->
  <nav class="catbar">
    <div class="catbar-inner" id="catbar"></div>
  </nav>

  <!-- 路由出口 -->
  <main id="app"></main>

  <footer class="foot">
    <div class="disc">⚠️ 本网站为「满足购买欲」的虚拟仿真体验，所有商品、价格、订单与物流均为虚构演示数据，不会产生任何真实交易或扣款。</div>
    <div class="foot-links">潮购虚拟商城 · 仅供娱乐与体验 · 商品图与数据仅保存在你本地浏览器</div>
  </footer>

  <div class="toast" id="toast"></div>

  <!-- 回到顶部 -->
  <button class="to-top" id="toTop" aria-label="回到顶部" title="回到顶部">
    <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 4.5 4.5 12l1.4 1.4L11 7.3V20h2V7.3l5.1 6.1 1.4-1.4z"/></svg>
    <span>顶部</span>
  </button>

  <!-- 在线客服 -->
  <div class="cs-fab" id="csFab" title="在线客服 · 售前/售后">
    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 3a8 8 0 0 0-8 8v3.5A2.5 2.5 0 0 0 6.5 17H8v-6H5.5A6.5 6.5 0 0 1 18.5 8.5h0V11h-2V8.5A8 8 0 0 0 12 3Zm-4 16a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z"/></svg>
    <span>客服</span>
    <i class="cs-ondot"></i>
  </div>

  <div class="cs-panel" id="csPanel" hidden>
    <div class="cs-head">
      <div class="cs-ava">🤖</div>
      <div class="cs-htxt">
        <div class="cs-name">潮购小助手</div>
        <div class="cs-on">● 在线 · 平均 1 秒回复</div>
      </div>
      <button class="cs-x" id="csClose" aria-label="关闭">✕</button>
    </div>
    <div class="cs-tabs">
      <button class="on" data-cstab="pre">💬 售前咨询</button>
      <button data-cstab="after">🛠️ 售后帮助</button>
    </div>
    <div class="cs-body" id="csBody"></div>
    <div class="cs-quick" id="csQuick"></div>
    <div class="cs-input">
      <input id="csInput" type="text" placeholder="问点啥？参数 / 价格 / 到哪了…" autocomplete="off" />
      <button id="csSend">发送</button>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
